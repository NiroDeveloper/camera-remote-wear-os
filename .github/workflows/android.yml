name: Android CI/CD

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Extract Version Name
      id: get_version
      run: |
        VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | awk -F '"' '{print $2}')
        echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
        echo "Detected Version: $VERSION_NAME"

    - name: Check if Tag exists
      id: check_tag
      run: |
        TAG_NAME="v${{ steps.get_version.outputs.version }}"
        # Fetch tags from origin to be sure we have the latest state
        git fetch --tags
        if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Tag $TAG_NAME already exists locally or on remote."
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "Tag $TAG_NAME is new."
        fi

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: List Build Artifacts (Debug)
      run: |
        echo "Searching for APKs..."
        find app/build/outputs/apk/ -name "*.apk"

    - name: Create GitHub Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master' && steps.check_tag.outputs.exists == 'false'
      uses: ncipollo/release-action@v1
      with:
        artifacts: "app/build/outputs/apk/release/*.apk"
        tag: v${{ steps.get_version.outputs.version }}
        name: "Release v${{ steps.get_version.outputs.version }}"
        body: |
          ## Camera Remote for Wear OS
          
          **Version:** ${{ steps.get_version.outputs.version }}
          **Commit:** ${{ github.sha }}

          *This release was automatically generated because a new version was detected.*
        allowUpdates: false
        artifactErrorsFailBuild: true
        replacesArtifacts: false
        generateReleaseNotes: true
        token: ${{ secrets.GITHUB_TOKEN }}
